<body class="tasks-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">

      <a href="index.html" class="logo d-flex align-items-center me-auto">
        <img src="assets/img/stepwise-logo.png" alt="">
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="profile.html">Perfil</a></li>
          <li><a href="profile.html#task" class="active">Tarefas</a></li>
          <li><a href="profile.html#history">Histórico</a></li>
          <li><a href="contact.html">Contato</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

    </div>
  </header>

  <main class="main">

    <div class="page-title light-background">
      <div class="container">
        <nav class="breadcrumbs">
          <ol>
            <li><a href="index.html">Home</a></li>
            <li class="current">Nova Tarefa</li>
          </ol>
        </nav>
        <h1>Nova Tarefa</h1>
      </div>
    </div>
    <section id="tasks" class="tasks section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row">

          <div class="col-lg-4 order-lg-2">

            <div class="sticky-sidebar">

              <div class="service-card" data-aos="fade-left" data-aos-delay="200">
                <div class="card-body">
                  <ul class="quick-info">
                    <h5>Prazo:</h5>
                    <li>
                      <i class="bi bi-clock"></i>
                      <input type="text" class="form-control" id="taskDeadline" placeholder="Prazo (ex.: 4-6 semanas)" required>
                    </li>
                    <h5>Complexidade:</h5>
                    <li class="mt-3">
                      <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="complexity" id="c1" value="1" checked>
                        <label class="btn btn-outline" style="color: #67f573;" for="c1">1</label>
                        <input type="radio" class="btn-check" name="complexity" id="c2" value="2">
                        <label class="btn btn-outline" style="color: #f9fc4a;" for="c2">2</label>
                        <input type="radio" class="btn-check" name="complexity" id="c3" value="3">
                        <label class="btn btn-outline" style="color: #fca23b;" for="c3">3</label>
                        <input type="radio" class="btn-check" name="complexity" id="c4" value="4">
                        <label class="btn btn-outline" style="color: #fa4343;" for="c4">4</label>
                        <input type="radio" class="btn-check" name="complexity" id="c5" value="5">
                        <label class="btn btn-outline" style="color: #bb0215;" for="c5">5</label>
                      </div>
                    </li>
                    <div class="tech-category mt-4">
                      <h5>Prioridade da Tarefa:</h5>
                      <div class="tech-tags" id="container-prioridade">
                        <span class="priority-tag" data-priority="Baixa">Baixa</span>
                        <span class="priority-tag" data-priority="Média">Média</span>
                        <span class="priority-tag" data-priority="Alta">Alta</span>
                      </div>
                    </div>
                  </ul>
                  <div class="cta-buttons mt-3">
                    <a href="#" class="btn-success">Criar Tarefa</a>
                  </div>
                </div>
              </div>

            </div>

          </div>

          <div class="col-lg-8 order-lg-1">

            <div class="service-overview" data-aos="fade-up" data-aos-delay="200">
              <div class="overview-header">
                <h3>Preencha abaixo os dados da tarefa:</h3>
                
                <div class="row gy-4">
                  <div class="col-md-12">
                    <input type="text" class="form-control" id="taskTitle" name="subject" placeholder="Título" required>
                  </div>

                  <div class="col-md-12">
                    <textarea class="form-control" id="taskDescription" name="message" rows="6" placeholder="Descrição" required></textarea>
                  </div>
                  
                  <div class="col-md-12">
                    <button type="button" id="btnAdicionarEtapa" class="btn btn-primary">Adicionar Etapa</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="tech-details" data-aos="fade-up" data-aos-delay="700">
              <div class="tech-categories">
                <div class="tech-category">
                  <h5>Tags</h5>
                  <div class="tech-tags" id="tagSelectionContainer">
                    <span class="selectable-tag">Artes</span>
                    <span class="selectable-tag">Estudos</span>
                    <span class="selectable-tag">Pessoal</span>
                    <span class="selectable-tag">Trabalho</span>
                    <span class="selectable-tag">Outros</span>
                  </div>
                </div>
              </div>
            </div>

          </div>

          <div class="workflow-section" data-aos="fade-up" data-aos-delay="500">
            <h3 class="section-heading">Etapas</h3>
            <div class="timeline">
              </div>
          </div>
        </div>

      </div>

    </section>
    </main>

  <div class="modal fade" id="modalNovaEtapa" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nova Etapa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <input type="text" id="modalTituloEtapa" class="form-control" placeholder="Título">
          </div>
          <div class="mb-3">
            <textarea id="modalDescricaoEtapa" class="form-control" placeholder="Descrição"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="salvarNovaEtapa">Adicionar</button>
        </div>
      </div>
    </div>
  </div>

  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <div id="preloader"></div>

  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/task.js"></script>
  <script src="assets/js/new-task.js"></script>

</body>

</html>
