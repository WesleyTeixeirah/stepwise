<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>StepWise </title>

  <link href="assets/img/stepwise-icon.png" rel="icon">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Raleway:wght@300;400;700&family=Mulish:wght@300;400;700&display=swap" rel="stylesheet">

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    .modal-content { color: #333; }
    .section-title label { display: block; margin-bottom: 15px; opacity: 0.8; }
  </style>
</head>

<body class="index-page">

  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">
      <a href="index.html" class="logo d-flex align-items-center me-auto">
        <img src="assets/img/stepwise-logo.png" alt="StepWise Logo">
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="#register">Cadastro</a></li>
          <li><a href="#login">Login</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
    </div>
  </header>

  <main class="main">

    <section id="index" class="index section dark-background">
      <img src="assets/img/stepwise-phone.png" alt="" data-aos="fade-in">

      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row justify-content-center">
          <div class="col-lg-8 text-center">
            <div class="container section-title" data-aos="fade-up">
              <span class="subtitle">Acesso</span>
              <h2>Recuperar Acesso</h2>
              <label>Para recuperar sua senha, digite o e-mail utilizado no cadastro no StepWise.</label>
              <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="E-mail" required>
            </div>
            <button type="button" id="btnRecuperar" class="btn btn-primary px-5">Recuperar</button>
          </div>
        </div>
      </div>
    </section>

    <div class="modal fade" id="modalSucessoEmail" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center pb-5">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            <h3 class="mt-3">Sucesso!</h3>
            <p>E-mail enviado com sucesso! Verifique sua caixa de entrada.</p>
          </div>
          <div class="modal-footer border-0 justify-content-center">
            <button type="button" class="btn btn-primary px-4" data-bs-dismiss="modal">Entendido</button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>


  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>

  <script src="assets/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const btnRecuperar = document.getElementById('btnRecuperar');
      const inputEmail = document.getElementById('exampleFormControlInput1');
      const modalSucesso = new bootstrap.Modal(document.getElementById('modalSucessoEmail'));

      btnRecuperar.addEventListener('click', function() {
        const emailValue = inputEmail.value.trim();
        
        const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (emailValue === "") {
          alert("Por favor, insira o seu e-mail.");
          inputEmail.focus();
          return;
        }

        if (!regexEmail.test(emailValue)) {
          alert("Por favor, insira um formato de e-mail válido (ex: usuario@email.com).");
          inputEmail.focus();
          return;
        }
        inputEmail.value = "";
        
        modalSucesso.show();
      });
    });
  </script>

</body>

</html>
